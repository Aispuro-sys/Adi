<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Adi — Corazón</title>
    <link rel="stylesheet" href="css/love.css">
</head>


<body>

    <audio loop id="audios" preload="auto" autoplay>
        <source src="MP3/FANTASIA LENTA.mp3" type="audio/mpeg" />
    </audio>

    <div class="container" onselectstart="return false;" unselectable="on" style="-moz-user-select:none;">

        <div class="body_left">
            <img src="images/biubiubiu.gif" alt="" ondragstart='return false;'>
        </div>

        <div class="body_center love">
            <div class="block">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
                <div class="div4"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="border">
            <div class="border-top"></div>
            <div class="border-bottom"></div>
        </div>
    </div>

    <script type="text/javascript" src="js/love.js"></script>
    <script>
        // Intentar reproducir música automáticamente
        const audio = document.getElementById('audios');
        
        // Intento inicial
        audio.play().catch(() => {
            // Si falla, reproducir al primer click/touch
            const playOnInteraction = () => {
                audio.play();
                document.removeEventListener('click', playOnInteraction);
                document.removeEventListener('touchstart', playOnInteraction);
            };
            document.addEventListener('click', playOnInteraction);
            document.addEventListener('touchstart', playOnInteraction);
        });
    </script>

</body>

</html>
